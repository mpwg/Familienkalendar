name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-maccatalyst:
    name: Build and Release Mac Catalyst App
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Mac Catalyst (Release)
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedData
        run: |
          set -euo pipefail
          xcodebuild \
            -project Familienkalendar.xcodeproj \
            -scheme Familienkalendar \
            -configuration Release \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -derivedDataPath "$DERIVED_DATA" \
            -quiet \
            build

      - name: Package .app as zip
        id: package
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedData
        run: |
          set -euo pipefail
          APP_PATH="$DERIVED_DATA/Build/Products/Release-maccatalyst/Familienkalendar.app"
          ZIP_PATH="$RUNNER_TEMP/Familienkalender-maccatalyst-${GITHUB_REF_NAME}.zip"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at: $APP_PATH"
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Familienkalender-maccatalyst-${{ github.ref_name }}
          path: ${{ steps.package.outputs.zip_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_path }}
          generate_release_notes: true
